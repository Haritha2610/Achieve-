<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table 5</title>
</head>
<body>
 
    <title>Rowspan and Colspan Example</title>
<body>

<table border="2" cellspacing="1" cellpadding="10" width="30%">

<tr bgcolor="yellow">
    <td>1</td>
    <td colspan="2">2</td>
    <td>3</td>
</tr>

<tr bgcolor="lightblue">
    <td rowspan="2" colspan="2">4</td>
    <td colspan="2">5</td>
</tr>

<tr bgcolor="lightgreen">
    <td>6</td>
    <td rowspan="2">7</td>
</tr>

<tr>
    <td rowspan="4" bgcolor="lightyellow">8</td>
    <td>9</td>
    <td>10</td>
</tr>

<tr>
    <td colspan="2" bgcolor="blue">12</td>
    <td rowspan="2" bgcolor="lightgray">11</td>
</tr>

<tr>
    <td rowspan="3" bgcolor="pink">13</td>
    <td colspan="2" bgcolor="pink">14</td>
</tr>

<tr bgcolor="tomato">
    <td>15</td>
    <td>16</td>
</tr>

<tr bgcolor="gold">
    <td colspan="4">17</td>
</tr>

</table>

    
</body>
</html>
