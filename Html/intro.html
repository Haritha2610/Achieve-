<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Intro</title>
</head>
<!--
    what is html?
    html is a markup language used for creating web pages and web applications. 
    It stands for Hyper Text Markup Language.
    html is a markup language used for creating web pages and web applications. 
    It stands for HyperText Markup Language and provides the structure of a webpage by using various tags and elements.
    HTML allows developers to define headings, paragraphs, links, images, lists, forms, and other content that can be displayed in a web browser.

    Time line of html versions:
    1. HTML 1.0 (1993)
    2. HTML 2.0 (1995)
    3. HTML 3.2 (1997)
    4. HTML 4.01 (1999)
    5. XHTML 1.0 (2000)
    6. HTML5 (2014)
    -Semantic HTML is a type of HTML that uses specific tags to convey meaning and structure to the content of a webpage. 
    It helps search engines and assistive technologies understand the purpose of different elements on the page, improving accessibility and SEO. 
    Examples of semantic HTML tags include <header>, <nav>, <main>, <article>, <section>, <aside>, and <footer>.

    -Non Semantic HTML tags do not provide any information about the content they contain.

    -HTML 4 vs HTML 5
|      Feature        | HTML 4                    | HTML5                                                  |
| Release Year      | 1997                      | 2014                                                  |
| Semantic Tags     | Not available             | Available (`<header>`, `<footer>`, `<section>`, etc.) |
| Audio & Video     | External plugins required | Built-in support using `<audio>` and `<video>`        |
| Graphics          | No Canvas support         | Supports `<canvas>` and SVG                           |
| Forms             | Basic form controls       | New input types (`email`, `date`, `number`, etc.)     |

types of html tags:
1.self-closing tags: These tags do not have a closing tag and are used for elements that do not require any content.
    Examples include <img>, <br>, <hr>, <input>, and <meta>.
2.container tags: These tags have both an opening and a closing tag and are used for elements that contain content. 
    Examples include <div>, <p>, <h1> to <h6>, <ul>, <ol>, <li>, <a>, and <span>.

Elements:
-elements are the building blocks of HTML and represent different types of content on a webpage.
types of elements:
1.block-level elements: These elements typically start on a new line and take up the full width available. 
    Examples include <div>, <p>, <h1> to <h6>, <ul>, <ol>, and <li>.
2.inline elements: These elements do not start on a new line and only take up as much width as necessary. 
    Examples include <span>, <a>, <strong>, <em>, and <img>.

Attributes:
-Attributes provide additional information about HTML elements and are specified within the opening tag.
types of attributes:
1.global attributes: These attributes can be used on any HTML element and include common attributes like id, class, style, title, and data-*.
2.specific attributes: These attributes are specific to certain HTML elements and provide additional functionality or behavior  
 syntax of attributes:
-<element attribute="value">Content</element>

deplicated tags: it is important to note that some HTML tags have been deprecated or are no longer recommended for use in modern web development.

    -->
<body>
    <h1>HTML Introduction</h1>
    <p>This page introduces the basics of HTML. Use headings, paragraphs, and simple structure to start building web pages.</p>
    
</body>
</html>
