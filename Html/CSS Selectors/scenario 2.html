<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce </title>
    <link rel="stylesheet" href="scenario 2.css">
</head>
<body>
<header class="bar">
    <div class="logo">
        🛍 ShopEasy
    </div>
    <div class="search-box">
        <input type="text" placeholder="Search for Products">
    </div>
    <div class="links">
        <a href="#"> 👤Login</a>
        <a href="#"> 🛒 Cart</a>
    </div>
</header>
<section class="products">

    <div class="card">
        <h2 class="product-name">Wireless Headphones</h2>
        <div class="offer">
            <p class="price">₹1,999</p>
        </div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Smart Watch</h2>
        <div class="offer">
            <p class="price">₹2,499</p>
        </div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name">Bluetooth Speaker</h2>
        <div class="offer">
            <p class="price">₹1,499</p>
        </div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Gaming Mouse</h2>
        <div class="offer">
            <p class="price">₹899</p>
        </div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name">Laptop Backpack</h2>
        <div class="offer">
            <p class="price">₹1,299</p>
        </div>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <h2 class="product-name discount">Wireless Keyboard</h2>
        <div class="offer">
            <p class="price">₹1,199</p>
        </div>
        <button>Add to Cart</button>
    </div>

</section>  
</body>
</html>
