<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags Cheatsheet</title>

</head>
<body>
    <h1>HTML Tags Cheatsheet</h1>
    <p>Common HTML tags and their usage examples.</p>

    <!--The basic structure of an HTML document includes the following tags: 
    ------------------------basic html tags-------------------------------------------------
    tag         description
    <html>      The root element that wraps the entire HTML document.              
    <head>      Contains metadata, title, and links to external resources.
    <title>     Specifies the title of the document, displayed in the browser's title bar or tab.
    <body>      Contains the visible content of the document, such as text, images, and other elements.
    <meta>      Provides metadata about the document, such as character encoding and viewport settings. 

    -------------------------Heading tags-------------------------------------------------
    tag         description
    <h1> to <h6>  Heading tags used to define headings of different levels, with <h1> being the highest level and <h6> the lowest.

    -------------------------text and list formatting tags--------------------------------
    tag         description
    <p>         Defines a paragraph of text.
    <br>        Inserts a line break within text.
    <strong>    Indicates strong importance or emphasis, typically displayed in bold.
    <em>        Indicates emphasized text, typically displayed in italics.
    <u>         Underlines the text.
    <hr>        Creates a horizontal rule or line to separate content.
    <b>         Displays text in bold.
    <i>         Displays text in italics.
    <li>        Defines a list item within an ordered or unordered list.
    <ol>        Defines an ordered list, where items are numbered.
    <ul>        Defines an unordered list, where items are bulleted.
    <a>         Defines a hyperlink to another webpage or resource.
    <sub>       Displays text as subscript.
    <sup>       Displays text as superscript. 
    <del>       Displays text with a strikethrough, indicating deletion or removal.
    <ins>       Displays text with an underline, indicating insertion or addition.
    <mark>      Highlights text with a background color, indicating relevance or importance.
    
    -------------------------image and media tags--------------------------------
    tag         description
    <img>       Embeds an image in the document.
    <audio>     Embeds an audio file in the document.
    <video>     Embeds a video file in the document.
    <source>    Specifies multiple media resources for <audio> and <video> elements.

    -------------------------form and input tags--------------------------------
    tag         description 
    <form>      Defines a form for user input.
    <input>     Defines an input field for user data.  
    <button>    Defines a clickable button.
    <label>     Defines a label for an input element.   
    <select>    Defines a drop-down list.
    <option>    Defines an option in a drop-down list.  
    <textarea>  Defines a multi-line text input field.
    <fieldset>  Groups related form elements together.
    <legend>    Defines a caption for a <fieldset> element.
    <datalist>  Provides a list of predefined options for an <input> element.  
    <output>    Represents the result of a calculation or user action.
    <progress>  Displays the progress of a task or operation.  
    <input type="text">  Defines a single-line text input field.
    <input type="password">  Defines a password input field that masks the entered characters.
    <input type="checkbox">  Defines a checkbox input field.
    <input type="radio">  Defines a radio button input field.
    <input type="submit">  Defines a submit button for a form.
    <input type="reset">  Defines a reset button for a form.  
    <input type="file">  Defines a file upload input field.
    <input type="hidden">  Defines a hidden input field that is not visible to the user.
    <input type="email">  Defines an input field for email addresses.  
    <input type="number">  Defines an input field for numeric values.
    <input type="date">  Defines an input field for selecting a date.
    <input type="color">  Defines an input field for selecting a color.
    <input type="range">  Defines an input field for selecting a value from a range.
    <input type="url">  Defines an input field for entering a URL.
    <input type="tel">  Defines an input field for entering a telephone number.
    <input type="search">  Defines an input field for search queries.
    <input type="time">  Defines an input field for selecting a time.
    <input type="week">  Defines an input field for selecting a week.
    <input type="month">  Defines an input field for selecting a month. 
    <input type="datetime-local">  Defines an input field for selecting a date and time.   
    <input type="image">  Defines an image as a submit button for a form.
    <input type="button">  Defines a clickable button that can trigger JavaScript functions.

    -------------------------table tags--------------------------------
    tag         description
    <table>     Defines a table for displaying tabular data.
    <tr>        Defines a table row.
    <td>        Defines a table cell within a row.  
    <th>        Defines a table header cell, typically displayed in bold and centered.
    <thead>     Groups the header content in a table.
    <tbody>     Groups the body content in a table.
    <tfoot>     Groups the footer content in a table.

    -------------------------semantic tags--------------------------------
    tag         description
    <header>    Represents the introductory content or a group of navigational links.
    <nav>       Represents a section of navigation links.
    <main>      Represents the main content of the document.    
    <article>   Represents a self-contained piece of content that can be independently distributed or reused.
    <section>   Represents a thematic grouping of content, typically with a heading.
    <aside>     Represents content that is tangentially related to the main content, such as sidebars or pull quotes.
    <footer>    Represents the footer content of a document or section, typically containing copyright information, contact details, or related links.
    
    -------------------------other tags--------------------------------
    tag         description
    <div>       Defines a generic container for grouping and styling content.   
    <span>      Defines a generic inline container for styling or grouping text.
    -->
        
   

  
</body>
</html>
