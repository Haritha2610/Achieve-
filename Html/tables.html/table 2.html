<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLES</title>
</head>
<body>
<table>
<h3>table 2:</h3>

   <title>Table using Colspan and Rowspan</title>
    <style>
        table{
            border-collapse:collapse;
            margin:auto;
            background:green;
            color:white;
            text-align:center;
            font-size:22px;
        }
        td{
            border:2px solid white;
            padding:12px;
            min-width:40px;
        }
        h2{
            text-align:center;
        }
    </style>
</head>

<h2>TABLE USING COLSPAN, ROWSPAN</h2>

<table>

<tr>
    <td rowspan="9">A</td>
    <td rowspan="8">B</td>
    <td rowspan="7">C</td>
    <td rowspan="6">D</td>
    <td rowspan="5">E</td>
    <td rowspan="4">F</td>

    <td colspan="2">AH</td>

    <td rowspan="4">H</td>
    <td rowspan="5">I</td>
    <td rowspan="6">J</td>
    <td rowspan="7">K</td>
    <td rowspan="8">L</td>
    <td rowspan="10">M</td>
</tr>

<tr>
    <td colspan="2">H</td>
</tr>

<tr>
    <td colspan="2">GH</td>
</tr>
<tr>
    <td colspan="3">N</td>
    
</tr>

<tr>
    <td colspan="7">O</td>
</tr>

<tr>
    <td colspan="8">P</td>
</tr>

<tr>
    <td colspan="10">Q</td>
</tr>

<tr>
    <td colspan="2">R</td>
    <td>S</td>
    <td>T</td>
    <td colspan="2">U</td>
    <td>V</td>
    <td>W</td>
    <td colspan="2">X</td>
</tr>

<tr>
    <td colspan="14">Y</td>
</tr>

<tr>
    <td>Z</td>
    <td>1</td>
    <td>2</td>
    <td>3</td>
    <td>4</td>
    <td>5</td>
    <td>6</td>
    <td>7</td>
    <td>8</td>
    <td>9</td>
    <td colspan="4">10</td>
    
</tr>

</table>
</body>
</html>
