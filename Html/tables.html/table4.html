<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<h2>Table with column and row spanned</h2>

<table border="2" cellspacing="0" cellpadding="30" width="80%">

    <tr>
        <td align="center" bgcolor="pink">Logo</td>
        <td colspan="3" align="center" bgcolor="lightyellow">
            <b>Top Menu</b>
        </td>
    </tr>

    <tr>
        <td rowspan="2" align="center" bgcolor="lightyellow">
            <b>Side<br>Menu</b>
        </td>

        <td align="center" bgcolor="lightblue">
            World News
        </td>

        <td align="center" bgcolor="lightblue">
            Financial
        </td>

        <td rowspan="2" align="center" bgcolor="pink">
            <b>List of<br>Ads</b>
        </td>
    </tr>

    <tr>
        <td align="center" bgcolor="lightblue">
            Technology
        </td>

        <td align="center" bgcolor="lightblue">
            Sports
        </td>
    </tr>

    <tr>
        <td colspan="4" align="center" bgcolor="blue">
            <b>Footer</b>
        </td>
    </tr>

</table>
</body>
</html>
